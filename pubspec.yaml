name: motion_guard
description: "MotionGuard theft and snatch detection app."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  flutter_secure_storage: ^9.2.2
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  permission_handler: ^11.3.1
  geolocator: ^12.0.0
  device_info_plus: ^10.1.2
  firebase_messaging: ^15.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  test: ^1.25.7

flutter:
  uses-material-design: true
